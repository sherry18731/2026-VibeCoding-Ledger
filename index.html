<!DOCTYPE html>
<html lang="zh-TW" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>個人記帳工具</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container py-4">
        <header class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h1 class="h3 mb-0">📊 我的記帳本</h1>
            <div>
                <button id="authorize_button" class="btn btn-outline-primary" style="display: none;">登入 Google
                    授權</button>
                <button id="signout_button" class="btn btn-outline-danger" style="display: none;">登出</button>
            </div>
        </header>

        <div id="app_content" style="display: none;">
            <div class="row g-4">

                <div class="col-md-5">
                    <div class="card mb-4">
                        <div class="card-header">新增記帳</div>
                        <div class="card-body">
                            <form id="record_form">
                                <div class="mb-3">
                                    <label class="form-label">日期</label>
                                    <input type="date" class="form-control" id="input_date" required>
                                </div>
                                <div class="row mb-3">
                                    <div class="col-6">
                                        <label class="form-label">類型</label>
                                        <select class="form-select" id="input_type" required></select>
                                    </div>
                                    <div class="col-6">
                                        <label class="form-label">分類</label>
                                        <select class="form-select" id="input_category" required></select>
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">金額</label>
                                    <input type="number" class="form-control" id="input_amount" min="0" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">付款方式</label>
                                    <select class="form-select" id="input_payment" required></select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">描述</label>
                                    <input type="text" class="form-control" id="input_description"
                                        placeholder="例如：711早餐">
                                </div>
                                <button type="submit" class="btn btn-primary w-100">新增紀錄</button>
                            </form>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">本月收支總覽</div>
                        <div class="card-body text-center">
                            <div class="row">
                                <div class="col-6">
                                    <h6 class="text-muted">總收入</h6>
                                    <h4 class="text-success" id="summary_income">$0</h4>
                                </div>
                                <div class="col-6">
                                    <h6 class="text-muted">總支出</h6>
                                    <h4 class="text-danger" id="summary_expense">$0</h4>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-7">
                    <div class="card mb-4">
                        <div class="card-header">本月支出分類佔比</div>
                        <div class="card-body" id="category_breakdown">
                            <p class="text-muted text-center mb-0">載入中或尚無資料...</p>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header">近期紀錄</div>
                        <div class="table-responsive">
                            <table class="table table-hover mb-0 text-nowrap">
                                <thead>
                                    <tr>
                                        <th>日期</th>
                                        <th>類型</th>
                                        <th>分類</th>
                                        <th>描述</th>
                                        <th class="text-end">金額</th>
                                    </tr>
                                </thead>
                                <tbody id="record_table_body">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script async defer src="https://apis.google.com/js/api.js"></script>
    <script async defer src="https://accounts.google.com/gsi/client"></script>
    <script src="script.js"></script>
</body>

</html>
